<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相關連結 - 國立臺灣大學經濟學系學生會</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@400;600;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    :root {
      --navy-900: #021226;
      --navy-800: #0A2647;
      --navy-700: #144272;
      --navy-100: #E6F0F9;
      --gold-500: #CBA16E;
      --gold-400: #DCC09B;
      --gold-100: #F9F3EB;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --bg-body: #F8FAFC;
      --bg-white: #FAFAFA;
      --ease-custom: cubic-bezier(0.19, 1, 0.22, 1);
    }

    /* ── 頁面主容器 ── */
    .links-page {
      min-height: calc(100vh - var(--header-h, 80px));
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(48px, 8vw, 96px) clamp(20px, 5%, 40px) 80px;
    }

    /* ── 頁首 ── */
    .links-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .links-header .site-avatar {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border: 2px solid var(--navy-900);
      margin-bottom: 16px;
    }

    .links-header h1 {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: clamp(1.35rem, 3vw, 1.75rem);
      font-weight: 900;
      color: var(--navy-900);
      margin: 0 0 6px;
      letter-spacing: -0.5px;
    }

    .links-header .subtitle {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold-500);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin: 0;
    }

    .links-divider {
      width: 60px;
      height: 4px;
      background: var(--gold-500);
      margin: 16px auto 0;
    }

    /* ── 連結清單 ── */
    .links-list {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── 分組標題 ── */
    .links-group-label {
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 20px 0 4px;
      padding-left: 4px;
    }

    .links-group-label:first-child {
      margin-top: 0;
    }

    /* ── 每一個連結卡片 ── */
    .lk-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px;
      border: 2px solid var(--navy-900);
      background: var(--bg-white);
      color: var(--navy-900);
      text-decoration: none;
      font-family: 'Noto Sans TC', sans-serif;
      position: relative;
      transition: transform 0.25s var(--ease-custom), box-shadow 0.25s, background 0.2s;
    }

    .lk-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--gold-500);
    }

    .lk-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 6px 6px 0 var(--navy-900);
      background: var(--navy-100);
      text-shadow: none !important;
    }

    .lk-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--navy-800);
    }

    .lk-icon svg {
      width: 24px;
      height: 24px;
    }

    .lk-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .lk-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy-900);
      letter-spacing: 0.3px;
    }

    .lk-desc {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      line-height: 1.4;
    }

    .lk-arrow {
      font-family: 'Outfit', sans-serif;
      color: var(--gold-500);
      font-size: 18px;
      flex-shrink: 0;
    }

    /* ── 返回首頁 ── */
    .back-home {
      margin-top: 48px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .back-home:hover {
      color: var(--navy-900);
      border-color: var(--gold-500);
      text-shadow: none !important;
    }
  </style>
</head>

<body>

  <!-- ── HEADER ── -->
  <header id="main-header">
    <div class="brand-area">
      <img src="images.jpeg" alt="Logo" class="site-logo">
      <a href="index.html" class="site-title">國立臺灣大學經濟學系學生會</a>
    </div>
    <div class="nav-area">
      <nav>
        <ul>
          <li><a href="index.html" class="nav-link">首頁</a></li>
          <li><a href="02_review.html" class="nav-link">活動回顧</a></li>
          <li><a href="01_about.html" class="nav-link">關於我們</a></li>
          <li><a href="03_support.html" class="nav-link">立即贊助</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ── 主體 ── -->
  <div class="links-page">

    <!-- 頁首資訊 -->
    <div class="links-header reveal active">
      <img src="images.jpeg" alt="NTU ECON SA" class="site-avatar">
      <h1>國立臺灣大學經濟學系學生會</h1>
      <p class="subtitle">NTU ECON SA · All Links</p>
      <div class="links-divider"></div>
    </div>

    <!-- 連結清單 -->
    <div class="links-list reveal active" id="links-list">
      <!-- 由 JS 動態渲染 -->
    </div>

    <a href="index.html" class="back-home">← 返回首頁</a>

  </div>

  <!-- ── FOOTER ── -->
  <footer>
    <div class="footer-content">
      <div class="footer-col">
        <h4>關於我們</h4>
        <ul>
          <li><a href="index.html">學生會首頁</a></li>
          <li><a href="02_review.html">活動回顧</a></li>
          <li><a href="01_about.html">關於我們</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>相關連結</h4>
        <ul>
          <li><a href="https://giving.ntu.edu.tw/" target="_blank">台大財務處捐款</a></li>
          <li><a href="http://www.econ.ntu.edu.tw/" target="_blank">經濟系官方網站</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>聯絡資訊</h4>
        <ul>
          <li>Email: ntu.econ.student@gmail.com</li>
          <li>台北市大安區羅斯福路四段1號</li>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      © 2026 國立臺灣大學經濟學系學生會 | All Rights Reserved.
    </div>
  </footer>

  <script>
    /* ── Header scroll ── */
    const header = document.getElementById('main-header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 50);
    });

    /* ── SVG Icons ── */
    function getIcon(name) {
      const icons = {
        instagram: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`,
        facebook: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>`,
        globe: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
        youtube: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/></svg>`,
        line: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.627.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>`,
      };
      return icons[name] || icons.globe;
    }

    /* ── 連結資料，與 links.json 同步，但可補充 desc 說明 ──
       ★ 維護時請在此陣列同步更新（或改為 fetch links.json 並在此另加 desc）
    */
    const LINKS = [
      {
        group: '社群媒體',
        items: [
          { title: '系學會 Instagram', desc: '追蹤最新活動動態', url: 'https://www.instagram.com/ntueconsa/', icon: 'instagram' },
          { title: '系學會 Facebook', desc: '粉絲專頁公告與貼文', url: 'https://www.facebook.com/ntueconsa', icon: 'facebook' },
        ]
      },
      {
        group: '官方資源',
        items: [
          { title: '臺大經濟系官網', desc: '系所介紹、師資、課程資訊', url: 'http://www.econ.ntu.edu.tw/', icon: 'globe' },
          { title: '台大財務處捐款專頁', desc: '透過台大財務處贊助學生會', url: 'https://giving.ntu.edu.tw/', icon: 'globe' },
        ]
      },
      {
        group: '影音頻道',
        items: [
          { title: 'NTU Econ Night YouTube', desc: '歷年經濟之夜活動影片', url: 'https://www.youtube.com/@ntuEconNight/videos', icon: 'youtube' },
        ]
      },
    ];

    /* ── 渲染 ── */
    const container = document.getElementById('links-list');
    LINKS.forEach(group => {
      const label = document.createElement('div');
      label.className = 'links-group-label';
      label.textContent = group.group;
      container.appendChild(label);

      group.items.forEach(link => {
        const a = document.createElement('a');
        a.href = link.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'lk-card';
        a.innerHTML = `
        <span class="lk-icon">${getIcon(link.icon)}</span>
        <span class="lk-body">
          <span class="lk-title">${link.title}</span>
          ${link.desc ? `<span class="lk-desc">${link.desc}</span>` : ''}
        </span>
        <span class="lk-arrow">→</span>
      `;
        container.appendChild(a);
      });
    });
  </script>

</body>

</html>
