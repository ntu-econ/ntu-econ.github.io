<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相關連結 — NTU ECON SA</title>
<meta name="description" content="NTU ECON SA 相關連結 — Instagram、Facebook、臺大經濟系官網、捐款平台">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
body{background:var(--navy);min-height:100vh;display:flex;flex-direction:column}
/* FULL PAGE LINKS */
.links-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 24px 80px;min-height:100vh}
/* avatar / logo block */
.links-avatar{width:88px;height:88px;border:2px solid rgba(203,161,110,.4);border-radius:50%;overflow:hidden;margin-bottom:20px;position:relative}
.links-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.links-avatar::after{content:'';position:absolute;inset:0;border-radius:50%;box-shadow:inset 0 0 0 2px rgba(203,161,110,.15)}
.links-name{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.links-desc{font-size:13px;color:rgba(255,255,255,.4);letter-spacing:2px;margin-bottom:48px;font-family:'Outfit',sans-serif}
/* cards */
.links-list{width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}
.link-row{display:flex;align-items:center;gap:14px;padding:16px 22px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);position:relative;overflow:hidden;text-decoration:none;color:inherit;transition:border-color .4s cubic-bezier(0.19,1,0.22,1),transform .4s cubic-bezier(0.19,1,0.22,1),box-shadow .4s}
.link-row::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(203,161,110,.09),transparent);transform:translateX(-100%);transition:transform .5s cubic-bezier(0.19,1,0.22,1)}
.link-row:hover{border-color:rgba(203,161,110,.4);transform:translateY(-3px);box-shadow:0 14px 40px rgba(2,18,38,.55)}
.link-row:hover::before{transform:translateX(0)}
.link-row-icon{width:40px;height:40px;border:1px solid rgba(203,161,110,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:all .3s}
.link-row:hover .link-row-icon{border-color:var(--gold);background:rgba(203,161,110,.1)}
.link-row-text{flex:1;text-align:left}
.link-row-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;margin-bottom:2px}
.link-row-url{font-family:'Outfit',sans-serif;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.link-row-arrow{font-size:14px;color:rgba(255,255,255,.2);transition:color .3s,transform .3s}
.link-row:hover .link-row-arrow{color:var(--gold);transform:translate(3px,-3px)}
/* back link */
.links-back{margin-top:40px;font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.25);transition:color .3s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.links-back:hover{color:var(--gold)}
/* bg decoration */
.links-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.links-bg-circle{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<!-- minimal navbar -->
<nav class="navbar" id="navbar" style="background:rgba(2,18,38,.85);backdrop-filter:blur(20px)">
  <div class="nav-brand magnetic">
    <img src="images.jpeg" alt="Logo"><span>NTU ECON SA</span>
  </div>
  <div class="nav-links">
    <a href="index.html" class="magnetic">首頁</a>
    <a href="review.html" class="magnetic">活動回顧</a>
    <a href="about.html" class="magnetic">關於我們</a>
    <a href="support.html" class="magnetic">贊助支持</a>
  </div>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">首頁</a><a href="review.html">活動回顧</a><a href="about.html">關於我們</a><a href="support.html">贊助支持</a>
</div>

<!-- BG decoration -->
<div class="links-bg">
  <div class="links-bg-circle" style="width:500px;height:500px;background:#CBA16E;top:-120px;right:-80px"></div>
  <div class="links-bg-circle" style="width:400px;height:400px;background:#3B82F6;bottom:-100px;left:-60px"></div>
</div>

<main class="links-page" style="position:relative;z-index:1">
  <div class="links-avatar">
    <img src="images.jpeg" alt="NTU ECON SA">
  </div>
  <div class="links-name">NTU ECON SA</div>
  <div class="links-desc">國立臺灣大學經濟學系學生會</div>
  <div class="links-list" id="linksList">
    <!-- populated from SITE_LINKS in site-data.js -->
  </div>
  <a href="index.html" class="links-back magnetic">← 返回首頁</a>
</main>

<script src="assets/data/site-data.js"></script>
<script>
(function(){
'use strict';
var cur=document.getElementById('cursor'),dot=document.getElementById('cursorDot');
var mx=0,my=0,cx=0,cy=0;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY});
(function a(){cx+=(mx-cx)*.14;cy+=(my-cy)*.14;cur.style.left=cx+'px';cur.style.top=cy+'px';dot.style.left=mx+'px';dot.style.top=my+'px';requestAnimationFrame(a)})();
document.querySelectorAll('a,button').forEach(function(el){el.addEventListener('mouseenter',function(){cur.classList.add('hover')});el.addEventListener('mouseleave',function(){cur.classList.remove('hover')})});
// Hamburger
var ham=document.getElementById('hamburger'),mm=document.getElementById('mobileMenu');
ham.addEventListener('click',function(){ham.classList.toggle('open');mm.classList.toggle('open')});
// Magnetic
document.querySelectorAll('.magnetic').forEach(function(el){
  el.addEventListener('mousemove',function(e){var r=el.getBoundingClientRect(),x=e.clientX-r.left-r.width/2,y=e.clientY-r.top-r.height/2;el.style.transform='translate('+x*.25+'px,'+y*.25+'px)'});
  el.addEventListener('mouseleave',function(){el.style.transform=''});
});
// Render links from site-data.js SITE_LINKS
var list=document.getElementById('linksList');
var data=(typeof SITE_LINKS!=='undefined')?SITE_LINKS:[];
data.forEach(function(item,i){
  var a=document.createElement('a');a.className='link-row';
  a.href=item.url;a.target='_blank';a.rel='noopener';
  var urlDisplay=item.url.replace(/^https?:\/\//,'').replace(/\/$/,'');
  a.innerHTML='<div class="link-row-icon">'+item.icon+'</div><div class="link-row-text"><div class="link-row-title">'+item.title+'</div><div class="link-row-url">'+urlDisplay+'</div></div><div class="link-row-arrow">↗</div>';
  a.style.opacity='0';a.style.transform='translateY(20px)';
  a.style.transition='opacity .6s, transform .6s cubic-bezier(0.19,1,0.22,1)';
  a.style.transitionDelay=(i*0.08)+'s';
  list.appendChild(a);
  a.addEventListener('mouseenter',function(){cur.classList.add('hover')});
  a.addEventListener('mouseleave',function(){cur.classList.remove('hover')});
  setTimeout(function(){a.style.opacity='1';a.style.transform='';},60+i*80);
});
})();
</script>
</body>
</html>
